#
# Consolidated workflow for pull request checks:
# - Formatting, linting, and copyright checks (run in parallel)
# - Version tag consistency checks (run in parallel)
# - Unit tests (run after all checks pass)

name: Pull Request Checks

on:
  pull_request:
    branches: [ "master" ]

jobs:
  # ============================================================================
  # FORMATTING AND LINTING CHECKS
  # ============================================================================

  check_ruff_formatting:
    runs-on: ubuntu-latest
    steps:
    - name: Check out source repository
      uses: actions/checkout@v3
    - name: Setup python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ruff
    - name: Code formatting with ruff
      run: |
        python -m ruff format . --check

  check_ruff_linting:
    runs-on: ubuntu-latest
    steps:
    - name: Check out source repository
      uses: actions/checkout@v3
    - name: Setup python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install ruff
    - name: Lint with ruff
      run: |
        python -m ruff check .

  check_reuse:
    runs-on: ubuntu-latest
    steps:
    - name: Reuse check
      uses: fsfe/reuse-action@v2

  check_copyrights:
    runs-on: ubuntu-latest
    steps:
    - name: Check out source repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Setup python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install GitPython
    - name: Check copyrights
      run: |
        python formatter.py --copyright --check --git-only

  formatting_checks_passed:
    name: All formatting checks passed
    runs-on: ubuntu-latest
    needs:
      - check_ruff_formatting
      - check_ruff_linting
      - check_reuse
      - check_copyrights
    if: always()
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        run: |
          if [[ ${{ needs.check_ruff_formatting.result }} == 'failure' || \
                ${{ needs.check_ruff_linting.result }} == 'failure' || \
                ${{ needs.check_reuse.result }} == 'failure' || \
                ${{ needs.check_copyrights.result }} == 'failure' ]]; then
            echo "One or more formatting checks failed"
            exit 1
          fi

  # ============================================================================
  # VERSION TAG CHECKS
  # ============================================================================

  check_version_tags:
    runs-on: ubuntu-latest
    steps:
    - name: Check out source repository
      uses: actions/checkout@v3
    - name: Setup python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install GitPython
    - name: Check version tags
      run: |
        python formatter.py --version

  version_checks_passed:
    name: All version checks passed
    runs-on: ubuntu-latest
    needs:
      - check_version_tags
    if: always()
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        run: |
          if [[ ${{ needs.check_version_tags.result }} == 'failure' ]]; then
            echo "One or more version checks failed"
            exit 1
          fi

  # ============================================================================
  # UNIT TESTS (run only after checks pass)
  # ============================================================================

  unittests:
    name: >-
      Test ${{ matrix.os }} Python ${{ matrix.python-version }}
      ${{ matrix.tests }}
    runs-on: ${{ matrix.os }}
    needs:
      - formatting_checks_passed
      - version_checks_passed
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        QT_API: ["pyqt5", "pyside6"]
        # Remove macos-latest until issues from silx with macOS are resolved
        # https://github.com/silx-kit/silx/issues/4457
        # TODO: re-add macos-latest when silx issue is fixed
        os: ["ubuntu-latest", "windows-latest"] #, "macos-latest"]
        tests: ["", "-m slow", "-m gui"]
        exclude:
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.12"
#          - os: macos-latest
#            python-version: "3.11"
#          - os: macos-latest
#            python-version: "3.12"

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache Python environment
      uses: actions/cache@v3
      with:
        path: |
          ${{ env.pythonLocation }}
        key: >-
          ${{ runner.os }}-python-${{ matrix.python-version }}-
          ${{ hashFiles('**/requirements.txt', 'setup.py',
          'pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-python-${{ matrix.python-version }}-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install .
        python -m pip install pytest
        python -m pip install pytest-qt
    - name: Install system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libopengl0
    - name: Run tests with pytest
      env:
        QT_API: ${{ matrix.QT_API }}
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m pytest ${{ matrix.tests }}

